name: Codex Apply Fixes

on:
  push:
    branches:
      - Prod

permissions:
  contents: write

jobs:
  apply-fixes:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Prod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply Codex fixes
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require('fs');

          function replaceInFile(path, pattern, replacement) {
            const before = fs.readFileSync(path, 'utf8');
            const after = before.replace(pattern, replacement);
            if (after === before) {
              console.log(`No replacement made in ${path}`);
            } else {
              fs.writeFileSync(path, after, 'utf8');
              console.log(`Updated ${path}`);
            }
          }

          replaceInFile(
            'bot.js',
            /TOKEN:\s*process\.env\.DISCORD_TOKEN\s*\|\|\s*['"][^'"]+['"],/,
            'TOKEN: process.env.DISCORD_TOKEN,'
          );

          replaceInFile(
            'server.js',
            /const SESSION_SECRET = process\.env\.SESSION_SECRET \|\| 'change-me-please-' \+ Math\.random\(\);/,
            'const SESSION_SECRET = process.env.SESSION_SECRET;'
          );

          replaceInFile(
            'crafts.js',
            /const DATA_DIR = '\/data';/,
            "const isRailway = !!(process.env.RAILWAY_ENVIRONMENT_NAME || process.env.RAILWAY_PROJECT_ID);\nconst DATA_DIR = process.env.DATA_DIR || (isRailway ? '/data' : path.join(__dirname, 'data'));"
          );

          const indexPath = 'index.js';
          let index = fs.readFileSync(indexPath, 'utf8');
          if (!index.includes('const REQUIRED_ENV = [')) {
            index = index.replace(
              "require('dotenv').config();\n",
              "require('dotenv').config();\n\nconst REQUIRED_ENV = [\n    'DISCORD_TOKEN',\n    'DISCORD_CLIENT_ID',\n    'DISCORD_CLIENT_SECRET',\n    'SESSION_SECRET',\n];\n\nconst missingEnv = REQUIRED_ENV.filter(name => !process.env[name]);\nif (missingEnv.length) {\n    console.error(`Variables d'environnement manquantes: ${missingEnv.join(', ')}`);\n    process.exit(1);\n}\n"
            );
            fs.writeFileSync(indexPath, index, 'utf8');
            console.log('Updated index.js');
          }

          const pkgPath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          pkg.engines = { node: '20.x' };
          fs.writeFileSync(pkgPath, `${JSON.stringify(pkg, null, 2)}\n`, 'utf8');

          fs.writeFileSync('.gitignore', 'node_modules/\n.env\ndata/\nnpm-debug.log*\n.DS_Store\n', 'utf8');
          fs.writeFileSync('.env.example', `# Bot Discord
DISCORD_TOKEN=ton-token-discord
GUILD_ID=1485254310894895282

# OAuth2 Discord
DISCORD_CLIENT_ID=ton-client-id
DISCORD_CLIENT_SECRET=ton-client-secret
DISCORD_REDIRECT_URI=https://ton-domaine.up.railway.app/auth/callback

# Securite session
SESSION_SECRET=change-ce-truc-en-quelque-chose-de-vraiment-aleatoire-et-long

# Local seulement. Sur Railway, utilise un volume monte sur /data.
DATA_DIR=./data

# Railway le definit automatiquement. En local, tu peux garder 3000.
PORT=3000
`, 'utf8');
          fs.writeFileSync('railway.json', `${JSON.stringify({
            $schema: 'https://railway.com/railway.schema.json',
            deploy: {
              startCommand: 'npm start',
              restartPolicyType: 'ON_FAILURE',
              restartPolicyMaxRetries: 10,
            },
          }, null, 2)}\n`, 'utf8');

          fs.rmSync('.github/workflows/codex-apply-fixes.yml', { force: true });
          NODE

          node --check index.js
          node --check bot.js
          node --check server.js
          node --check crafts.js

          if grep -R "MTQ4NTI2ODY5NzUyMTA2NTk5NA" -n . --exclude-dir=.git; then
            echo "Discord token still present" >&2
            exit 1
          fi

          git config user.name "codex-app[bot]"
          git config user.email "codex-app[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Secure Railway deployment config"
          git push origin HEAD:Prod
